{% extends "main.html" %}
{% block title %} Login {% endblock%}

{% block content %}

<div class="container mt-5 mb-5">
    <div class="row mt-5 justify-content-center">
        <div class="col-lg-5 col-md-6 col-sm-8" style="border: 1px solid grey; padding:40px">
            <h2 class="text-center mb-4">Welcome Back</h2>
            <p class="text-center text-muted mb-4">Sign in to your account to continue</p>
            
            <form action="{% url 'login' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" required name="email" id="email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="mb-4">
                    <label for="password" class="form-label">Password</label>
                    <input type="password" required name="password" id="password" class="form-control" placeholder="Enter your password">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">Login</button>
                </div>
                <div class="text-center">
                    <p class="text-muted">Don't have an account? <a href="{% url 'newuser' %}" class="text-primary fw-bold">Create one</a></p>
                </div>
            </form>
            
            {% if messages %}
            <div class="text-center mt-3">
                {% for msg in messages %}
                    <div class="alert alert-danger fade show" role="alert">
                        {{ msg }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}

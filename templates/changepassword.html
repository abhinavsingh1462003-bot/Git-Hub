{% extends 'main.html' %}
{% block title %} Change Password {% endblock %}

{% block content %}
<div class="container my-5">
    <div class="row justify-content-center">
        <div class="col-lg-5 col-md-6 col-sm-8" style="border: 1px solid grey; padding:40px">
            <h2 class="text-center mb-4">Change Your Password</h2>
            <p class="text-center text-muted mb-4">Update your account security</p>
            
            <form action="{% url 'changepassword' %}" method="post">
                {% csrf_token %}
                <div class="mb-3">
                    <label for="email" class="form-label">Email Address</label>
                    <input type="email" required name="email" id="email" class="form-control" placeholder="Enter your email">
                </div>
                <div class="mb-3">
                    <label for="current_password" class="form-label">Current Password</label>
                    <input type="password" required name="current_password" id="current_password" class="form-control" placeholder="Enter current password">
                </div>
                <div class="mb-3">
                    <label for="new_password" class="form-label">New Password</label>
                    <input type="password" required name="new_password" id="new_password" class="form-control" placeholder="Enter new password">
                </div>
                <div class="mb-4">
                    <label for="confirm_password" class="form-label">Confirm New Password</label>
                    <input type="password" required name="confirm_password" id="confirm_password" class="form-control" placeholder="Confirm new password">
                </div>
                <div class="d-grid gap-2 mb-3">
                    <button type="submit" class="btn btn-primary btn-lg">Change Password</button>
                </div>
                <div class="text-center">
                    <a href="{% url 'home' %}" class="text-muted">Back to Home</a>
                </div>
            </form>
            
            {% if messages %}
            <div class="text-center mt-3">
                {% for message in messages %}
                    <div class="alert alert-danger fade show" role="alert">
                        {{ message }}
                    </div>
                {% endfor %}
            </div>
            {% endif %}
        </div>
    </div>
</div>
{% endblock %}
